name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --python ${{ matrix.python }}
      - run: uv run pytest
      - run: uv run statediff --help
      - run: uv build
      - name: Wheel install smoke test
        run: |
          uv venv wheel-smoke --python ${{ matrix.python }}
          uv pip install --python wheel-smoke/bin/python dist/*.whl
          wheel-smoke/bin/statediff --help
